; PlatformIO Project Configuration File
; AIGlass ESP32-CAM Firmware

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.wchusbserial14410
monitor_port = /dev/cu.wchusbserial14410


; ── ESP32-CAM requires PSRAM for frame buffers ──
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_upload.flash_size = 4MB
board_build.sdkconfig = sdkconfig.esp32cam

; ── ESP-IDF camera component ──
lib_deps =
    ;espressif/esp32-camera @ ^2.0.0

; ── WiFi credentials (passed as build flags → Kconfig macros) ──
; Change these to your actual WiFi SSID and password
build_flags =
    -DCONFIG_WIFI_SSID=\"susu\"
    -DCONFIG_WIFI_PASSWORD=\"suhuahua1998\"
    -DBOARD_HAS_PSRAM
    -DCONFIG_SCCB_CLK_FREQ=100000
    -DCONFIG_CAMERA_DMA_BUFFER_SIZE_MAX=32768
    -DCONFIG_OV2640_SUPPORT=1
    -DCONFIG_OV3660_SUPPORT=1
    -DCONFIG_SCCB_HARDWARE_I2C_PORT1=1
    -DCONFIG_SCCB_HARDWARE_I2C_PORT0=0
    -DCONFIG_CAMERA_CORE0=1
    -DCONFIG_CAMERA_TASK_STACK_SIZE=2048
    -DCONFIG_GC_SENSOR_SUBSAMPLE_MODE=1

; ── Partition table: use larger app partition for camera firmware ──
board_build.partitions = huge_app.csv