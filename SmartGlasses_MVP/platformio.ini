; PlatformIO Project Configuration File
; AIGlass ESP32-CAM Firmware

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbserial-XXXX     ; ⚠️ Set your actual port (macOS: ls /dev/cu.*, Windows: COM3, Linux: /dev/ttyUSB0)
monitor_port = /dev/cu.usbserial-XXXX    ; ⚠️ Set your actual port


; ── ESP32-CAM requires PSRAM for frame buffers ──
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_upload.flash_size = 4MB
board_build.sdkconfig = sdkconfig.esp32cam

; ── ESP-IDF camera component ──
lib_deps =
    ;espressif/esp32-camera @ ^2.0.0

; ── WiFi credentials (passed as build flags → Kconfig macros) ──
; ⚠️  NEVER commit real credentials. Set WIFI_SSID and WIFI_PASSWORD
;     environment variables, or create a platformio.local.ini override.
;     Example for macOS/Linux:
;       export PLATFORMIO_BUILD_FLAGS="-DCONFIG_WIFI_SSID=\\"YourWiFiSSID\\" -DCONFIG_WIFI_PASSWORD=\\"YourWiFiPassword\\""
;     Then use build_flags = ${env.PLATFORMIO_BUILD_FLAGS}
build_flags =
    -DCONFIG_WIFI_SSID=\"YOUR_WIFI_SSID\"
    -DCONFIG_WIFI_PASSWORD=\"YOUR_WIFI_PASSWORD\"
    -DBOARD_HAS_PSRAM
    -DCONFIG_SCCB_CLK_FREQ=100000
    -DCONFIG_CAMERA_DMA_BUFFER_SIZE_MAX=32768
    -DCONFIG_OV2640_SUPPORT=1
    -DCONFIG_OV3660_SUPPORT=1
    -DCONFIG_SCCB_HARDWARE_I2C_PORT1=1
    -DCONFIG_SCCB_HARDWARE_I2C_PORT0=0
    -DCONFIG_CAMERA_CORE0=1
    -DCONFIG_UPLOAD_URL=\"https://your-cloud-env-id.service.tcloudbase.com/uploadImage\"
    -DCONFIG_CAMERA_TASK_STACK_SIZE=2048
    -DCONFIG_GC_SENSOR_SUBSAMPLE_MODE=1

; ── Partition table: use larger app partition for camera firmware ──
board_build.partitions = huge_app.csv